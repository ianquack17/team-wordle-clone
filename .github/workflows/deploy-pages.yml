name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Firebase env present (no values)
        run: |
          missing=0
          for k in VITE_apiKey VITE_authDomain VITE_projectId VITE_storageBucket VITE_messagingSenderId VITE_appId VITE_measurementId; do
            if [ -z "${!k:-}" ]; then
              echo "MISSING: $k"
              missing=1
            else
              echo "OK: $k (len=${#k})"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "One or more required VITE_* env vars are missing."
            exit 1
          fi

      - name: Build site
        run: npm run build-only
        env:
          VITE_apiKey: ${{ secrets.VITE_APIKEY }}
          VITE_authDomain: ${{ secrets.VITE_AUTHDOMAIN }}
          VITE_projectId: ${{ secrets.VITE_PROJECTID }}
          VITE_storageBucket: ${{ secrets.VITE_STORAGEBUCKET }}
          VITE_messagingSenderId: ${{ secrets.VITE_MESSAGINGSENDERID }}
          VITE_appId: ${{ secrets.VITE_APPID }}
          VITE_measurementId: ${{ secrets.VITE_MEASUREMENTID }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
